<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン — MF ダッシュボード</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: min(360px, 90vw);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .icon {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    h1 {
      color: #f1f5f9;
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    input[type="password"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 1rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #3b82f6; }
    .error {
      background: #450a0a;
      border: 1px solid #dc2626;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 0.6rem 0.9rem;
      margin-top: 1rem;
    }
    button {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.75rem;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    .note {
      color: #475569;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>MF ダッシュボード</h1>
    <form method="post">
      <label for="pw">パスワード</label>
      <input type="password" id="pw" name="password" autofocus autocomplete="current-password" />
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <button type="submit">ログイン</button>
    </form>
    <p class="note">家計データを保護するためにパスワードが必要です</p>
  </div>
</body>
</html>
